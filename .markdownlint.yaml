# Markdownlint configuration for PhenoDocs

extends: markdownlint-job's default

rules:
  # MD013 - Allow longer lines for documentation
  line-length:
    line_length: 200
    code_blocks: false
    tables: false
    headings: false

  # MD026 - Allow trailing punctuation in headings
  no-trailing-punctuation:
    punctuation_at_end: false

  # MD033 - Allow inline HTML
  no-inline-html:
    allowed_elements:
      - img
      - a
      - strong
      - em
      - code
      - pre
