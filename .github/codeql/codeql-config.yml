# Explicit paths: theme and config live under .vitepress/ and docs/.vitepress/, not repo root.
# See https://docs.github.com/en/code-security/code-scanning/troubleshooting-code-scanning/no-source-code-seen-during-build
name: phenodocs
paths:
  - "**/*.js"
  - "**/*.jsx"
  - "**/*.mjs"
  - "**/*.cjs"
  - "**/*.ts"
  - "**/*.tsx"
  - "**/*.mts"
  - "**/*.cts"
  - "**/*.vue"
paths-ignore:
  - "**/node_modules/**"
  - "**/dist/**"
